version: 1
backend:
  phases:
    build:
      commands:
        # Use `npm install` instead of `npm ci`. The AWS Amplify/CDK packages
        # ship bundled dependencies with exact version pins, which makes the
        # generated package-lock.json incompatible with the strict `npm ci`
        # validation. `npm install` resolves the same tree without failing.
        - npm install --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
